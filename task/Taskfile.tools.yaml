version: '3'

vars:
  LOCAL_BIN: "{{ .USER_WORKING_DIR }}/.bin"

env:
  GOBIN: "{{ .LOCAL_BIN }}"

tasks:

  # ===========================================================================
  # Public API
  # ===========================================================================
  install:
    desc: Install all development tools
    deps:
      - task: install:buf
      - task: install:protoc-gen-go
      - task: install:protoc-gen-go-grpc
      - task: install:mockery
      - task: install:golangci-lint

  clean:
    desc: Remove all installed tools
    cmds:
      - cmd: echo "Removing development tools..."
      - rm -rf "{{ .LOCAL_BIN }}"

  list:
    desc: List installed tools
    cmds:
      - cmd: echo "Installed tools:"
      - ls -1 "{{ .LOCAL_BIN }}" || true

  # ============================================================================
  # buf
  # ============================================================================
  install:buf:
    deps:
      - task: installer:go
        vars:
          NAME: buf
          MODULE: github.com/bufbuild/buf/cmd/buf
          VERSION: v1.71.0
    
  # ============================================================================
  # protoc-gen-go
  # ============================================================================
  install:protoc-gen-go:
    deps:
      - task: installer:go
        vars:
          NAME: protoc-gen-go
          MODULE: google.golang.org/protobuf/cmd/protoc-gen-go
          VERSION: v1.36.11

  # ============================================================================
  # protoc-gen-go-grpc
  # ============================================================================
  install:protoc-gen-go-grpc:
    deps:
      - task: installer:go
        vars:
          NAME: protoc-gen-go-grpc
          MODULE: google.golang.org/grpc/cmd/protoc-gen-go-grpc
          VERSION: v1.6.2

  # ============================================================================
  # mockery
  # ============================================================================
  install:mockery:
    deps:
      - task: installer:go
        vars:
          NAME: mockery
          MODULE: github.com/vektra/mockery/v3
          VERSION: v3.7.1

  # ============================================================================
  # golangci-lint
  # ============================================================================
  install:golangci-lint:
    deps:
      - task: installer:script
        vars:
          NAME: golangci-lint
          SCRIPT: curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "{{ .LOCAL_BIN }}"
          VERSION: v2.12.2

  # ===========================================================================
  # Generic
  # ===========================================================================
  installer:go:
    internal: true
    status:
      - test -x "{{ .LOCAL_BIN }}/{{ .NAME }}"
    cmds:
      - mkdir -p "{{ .LOCAL_BIN }}"
      - |
        echo "Installing {{ .NAME }} {{ .VERSION }}"
        go install {{ .MODULE }}@{{ .VERSION }}

  installer:script:
    internal: true
    status:
      - test -x "{{ .LOCAL_BIN }}/{{ .NAME }}"
    cmds:
      - mkdir -p "{{ .LOCAL_BIN }}"
      - "{{ .SCRIPT }} {{ .VERSION }}"